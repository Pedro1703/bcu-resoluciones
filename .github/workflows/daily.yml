name: BCU Resoluciones SSF

on:
  schedule:
    # 11:30 UTC = 08:30 en Uruguay (UTC-3). Todos los días.
    - cron: "30 11 * * *"
  workflow_dispatch: {}

permissions:
  contents: write
  issues: write

concurrency:
  group: bcu-resoluciones
  cancel-in-progress: false

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Scrapear y analizar
        env:
          GITHUB_TOKEN: ${{ github.token }}
          # Opcional: si cargás este secret, Claude redacta el briefing periodístico.
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # Opcional: email HTML.
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: python run.py

      - name: Guardar dataset, textos y reporte
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ reports/ || true
          if git diff --cached --quiet; then
            echo "Sin cambios para commitear."
          else
            git commit -m "BCU: actualizar dataset y reporte [skip ci]"
            git push
          fi
