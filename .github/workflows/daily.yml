name: BCU Resoluciones SSF

on:
  schedule:
    # 11:30 UTC = 08:30 en Uruguay (UTC-3). Todos los días.
    - cron: "30 11 * * *"
  workflow_dispatch:
    inputs:
      baseline_extract:
        description: "Cuántos candidatos extraer en esta corrida"
        required: false
        default: ""

permissions:
  contents: write

concurrency:
  group: bcu-resoluciones
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Scrapear, extraer y construir el sitio
        env:
          # Recomendado: activa la extracción estructurada y el informe con Claude.
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # Permite forzar el tamaño de tanda desde "Run workflow".
          BASELINE_EXTRACT: ${{ github.event.inputs.baseline_extract }}
          MAX_EXTRACT: ${{ vars.MAX_EXTRACT }}
        run: python run.py

      - name: Commitear dataset y sitio
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ docs/ || true
          if git diff --cached --quiet; then
            echo "Sin cambios para commitear."
          else
            git commit -m "BCU: actualizar dataset y sitio [skip ci]"
            git push
          fi
